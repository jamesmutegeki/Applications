services:
  - type: web
    name: secure-messenger
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MESSENGER_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: messenger-db
          property: connectionString
    autoDeploy: true

databases:
  - name: messenger-db
    databaseName: messenger
    plan: free