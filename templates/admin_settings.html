{% extends 'base.html' %}
{% block title %}System Settings - YoCoin{% endblock %}
{% block styles %}
<style>
main.container { max-width: 100% !important; padding-left: 24px; padding-right: 24px; }
</style>
{% endblock %}
{% block content %}
<div class='row'>
<div class='col-12'>
<div class='card p-4 mt-4'>
<div class='d-flex justify-content-between align-items-center mb-3'>
<h3 class='fw-bold mb-0'><i class='bi bi-gear me-2' style='color:var(--p)'></i>System Settings</h3>
<a href='{{ url_for("admin_dashboard") }}' class='btn btn-outline-secondary btn-sm'>Back</a>
</div>
<form method='POST'>
<div class='row g-3'>
{% for s in settings_list %}
<div class='col-md-6'>
<label class='form-label fw-semibold'>{{ s.description or s.setting_key.replace('_',' ').title() }}</label>
<div class='input-group'>
<input type='text' name='setting_{{ s.setting_key }}' class='form-control' value='{{ s.setting_value }}'>
<span class='input-group-text small text-muted'>{{ s.setting_key }}</span>
</div></div>{% endfor %}
</div>
<button type='submit' class='btn btn-p mt-4'><i class='bi bi-check-lg me-1'></i>Save Settings</button>
</form>
</div></div></div>
{% endblock %}
