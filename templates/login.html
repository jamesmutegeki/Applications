{% extends 'base.html' %}

{% block title %}YoCoin - Login{% endblock %}



{% block content %}
<style>
body{background:#0d0d1a!important}
footer{display:none!important}
.login-bg{position:fixed;inset:0;z-index:0;background:url('https://images.unsplash.com/photo-1566577739112-5180d4bf9391?w=1600&q=80') center/cover no-repeat;filter:brightness(0.35) saturate(1.2);transform:scale(1.1);animation:slowZoom 20s ease-in-out infinite alternate}
@keyframes slowZoom{0%{transform:scale(1.1)}100%{transform:scale(1.25)}}
.login-overlay{position:fixed;inset:0;z-index:1;background:linear-gradient(135deg,rgba(0,0,0,0.7) 0%,rgba(34,139,34,0.25) 50%,rgba(0,0,0,0.6) 100%)}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;z-index:2;margin:calc(-1.5rem - 76px) calc(-50vw + 50%) 0;padding-top:76px;width:100vw}

.floating-coin{position:fixed;width:40px;height:40px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ffd700,#b8860b);box-shadow:0 0 20px rgba(255,215,0,0.3),inset 0 -3px 8px rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#8B6914;opacity:0;animation:floatCoin var(--d,12s) ease-in-out var(--dd,0s) infinite;pointer-events:none;z-index:3}
.floating-coin::after{content:'YC';font-size:10px;font-weight:900;color:rgba(139,105,20,0.6);letter-spacing:0}
@keyframes floatCoin{0%{opacity:0;transform:translateY(100vh) rotate(0deg) scale(0.5)}10%{opacity:0.6}90%{opacity:0.6}100%{opacity:0;transform:translateY(-10vh) rotate(720deg) scale(1.2)}}

.login-card{position:relative;z-index:4;width:100%;max-width:420px;margin:0 auto}
.login-card .card{background:rgba(255,255,255,0.06);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.1);border-radius:24px;box-shadow:0 25px 60px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.1);padding:2.5rem}
.login-card .logo{width:56px;height:56px;font-size:1.4rem;margin:0 auto 1rem}
.login-card h2{color:#fff;font-weight:700}
.login-card .text-muted{color:rgba(255,255,255,0.5)!important}
.login-card .fc{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:#fff;border-radius:14px;padding:14px 18px}
.login-card .fc:focus{background:rgba(255,255,255,0.1);border-color:var(--a);box-shadow:0 0 0 3px rgba(212,168,0,0.15)}
.login-card .fc::placeholder{color:rgba(255,255,255,0.3)}
.login-card .form-label{color:rgba(255,255,255,0.7);font-weight:500;font-size:0.85rem;margin-bottom:6px}
.login-card .form-check-label{color:rgba(255,255,255,0.6)}
.login-card .input-group .btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.5)}
.login-card .input-group .btn:hover{background:rgba(255,255,255,0.12)}
.login-card a{color:var(--a)!important}
.login-card a:hover{color:#e6b800!important}
.login-card .btn-p{background:linear-gradient(135deg,#D4A800,#b8860b);border-radius:14px;padding:14px;font-weight:700;font-size:1rem;letter-spacing:0.3px}
.login-card .btn-p:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(212,168,0,0.35)}
.login-card hr{opacity:0.1}
</style>

<div class='login-page'>
<div class='login-bg'></div>
<div class='login-overlay'></div>

<div class='floating-coin' style='left:8%;--d:14s;--dd:0s'></div>
<div class='floating-coin' style='left:22%;--d:18s;--dd:3s;width:30px;height:30px;font-size:10px'></div>
<div class='floating-coin' style='left:40%;--d:16s;--dd:6s'></div>
<div class='floating-coin' style='left:55%;--d:20s;--dd:2s;width:35px;height:35px;font-size:12px'></div>
<div class='floating-coin' style='left:70%;--d:15s;--dd:8s'></div>
<div class='floating-coin' style='left:85%;--d:17s;--dd:4s;width:28px;height:28px;font-size:9px'></div>
<div class='floating-coin' style='left:15%;--d:22s;--dd:10s;width:45px;height:45px;font-size:15px'></div>
<div class='floating-coin' style='left:92%;--d:19s;--dd:7s'></div>
<div class='floating-coin' style='left:48%;--d:13s;--dd:5s;width:25px;height:25px;font-size:8px'></div>
<div class='floating-coin' style='left:65%;--d:21s;--dd:9s;width:32px;height:32px;font-size:11px'></div>

<div class='login-card'>
<div class='card'>
<div class='text-center mb-4'>
<div class='logo bouncing-logo' style='width:56px;height:56px;font-size:1.4rem;margin:0 auto 1rem'>YC</div>
<h2 class='fw-bold mb-1' style='color:#fff'>Welcome Back</h2>
<p class='text-muted mb-0' style='color:rgba(255,255,255,0.5)!important'>Sign in to your account</p>
</div>
<form method='POST' action="{{ url_for('login') }}">
{{ form.hidden_tag() }}
<div class='mb-3'>
<label class='form-label'>Email Address</label>
<input type='email' class='form-control fc' id='email' name='email' placeholder='you@example.com' required>
</div>
<div class='mb-3'>
<label class='form-label'>Password</label>
<div class='input-group'>
<input type='password' class='form-control fc' id='password' name='password' placeholder='Your password' required>
<button class='btn btn-outline-secondary' type='button' onclick='togglePassword(event)'><i class='bi bi-eye'></i></button>
</div>
</div>
<div class='mb-4 form-check'><input type='checkbox' class='form-check-input' id='remember' name='remember'><label class='form-check-label' for='remember'>Remember me</label></div>
<div class='d-grid'><button type='submit' class='btn btn-p btn-lg'><i class='bi bi-box-arrow-in-right me-2'></i>Sign In</button></div>
</form>
<div class='text-center mt-4'>
<p class='text-muted mb-0' style='color:rgba(255,255,255,0.5)!important'>New to YoCoin? <a href="{{ url_for('register') }}" style='color:var(--a)!important;font-weight:600;'>Create Account</a></p>
<p class='text-muted mb-0 mt-1'><a href="{{ url_for('password_reset_request') }}" style='color:rgba(255,255,255,0.4)!important;font-size:0.85rem;'>Forgot Password?</a></p>
</div>
</div>
</div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePassword(e){var p=document.getElementById('password');var i=e.currentTarget.querySelector('i');p.type=p.type==='password'?'text':'password';i.classList.toggle('bi-eye');i.classList.toggle('bi-eye-slash')}
</script>
{% endblock %}
