{% extends 'base.html' %}
{% block title %}Verify 2FA - YoCoin{% endblock %}
{% block content %}
<div class='row justify-content-center'>
<div class='col-md-5 col-lg-4'>
<div class='card p-4 mt-5'>
<div class='text-center mb-4'>
<div class='logo mx-auto mb-3' style='width:50px;height:50px;'>YC</div>
<h2 class='fw-bold mb-1'>Two-Factor Authentication</h2>
<p class='text-muted mb-0'>Enter the 6-digit code from your authenticator app</p>
</div>
<form method='POST'>
<div class='mb-3'>
<label class='form-label'>Authentication Code</label>
<input type='text' class='form-control fc text-center' name='totp_code' maxlength='6' pattern='[0-9]{6}' placeholder='000000' required autofocus style='font-size:1.5rem;letter-spacing:0.5rem'>
</div>
<div class='d-grid mb-3'>
<button type='submit' class='btn btn-p btn-lg'><i class='bi bi-shield-check me-2'></i>Verify</button>
</div>
</form>
<div class='text-center'>
<small class='text-muted'>Lost access? <a href='#' data-bs-toggle='modal' data-bs-target='#backupModal'>Use backup code</a></small>
</div>
</div>
</div>
</div>
<div class='modal fade' id='backupModal'>
<div class='modal-dialog'>
<div class='modal-content'>
<form method='POST'>
<div class='modal-header'>
<h5 class='modal-title'>Use Backup Code</h5>
<button type='button' class='btn-close' data-bs-dismiss='modal'></button>
</div>
<div class='modal-body'>
<input type='hidden' name='use_backup' value='true'>
<label class='form-label'>Enter one of your backup codes</label>
<input type='text' class='form-control fc' name='totp_code' placeholder='XXXX-XXXX' required>
</div>
<div class='modal-footer'>
<button type='button' class='btn btn-secondary' data-bs-dismiss='modal'>Cancel</button>
<button type='submit' class='btn btn-primary'>Verify</button>
</div>
</form>
</div>
</div>
</div>
{% endblock %}
