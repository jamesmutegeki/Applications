{% extends 'base.html' %}
{% block title %}Disable 2FA - YoCoin{% endblock %}
{% block content %}
<div class='row justify-content-center'>
<div class='col-md-5'>
<div class='card p-4 mt-5'>
<div class='text-center mb-4'>
<h3 class='fw-bold'><i class='bi bi-shield-x me-2 text-danger'></i>Disable 2FA</h3>
<p class='text-muted'>Enter your current 6-digit code to disable two-factor authentication</p>
</div>
<div class='alert alert-warning'>
<i class='bi bi-exclamation-triangle me-2'></i>
Disabling 2FA reduces your account security. Consider keeping it enabled.
</div>
<form method='POST'>
<div class='mb-3'>
<label class='form-label'>Authentication Code</label>
<input type='text' class='form-control fc text-center' name='totp_code' maxlength='6' pattern='[0-9]{6}' placeholder='000000' required style='font-size:1.5rem;letter-spacing:0.5rem'>
</div>
<div class='d-grid gap-2'>
<button type='submit' class='btn btn-danger btn-lg'>Disable 2FA</button>
<a href='{{ url_for("profile") }}' class='btn btn-outline-secondary'>Cancel</a>
</div>
</form>
</div>
</div>
</div>
{% endblock %}
