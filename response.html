<!DOCTYPE html>
<html lang=en>
<head>
<meta charset=UTF-8>
<meta name=viewport content='width=device-width,initial-scale=1.0'>
<title>YoCoin - Login</title>
<link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel=stylesheet>
<link rel=stylesheet href='https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css'>
<link rel='icon' type='image/svg+xml' href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%23228B22'/><text x='50' y='70' font-size='60' font-weight='bold' text-anchor='middle' fill='%23FFCC00'>YC</text></svg>">
<style>
:root{--danger:#dc3545;--p:#228B22;--pd:#1a6b1a;--a:#D4A800;--d:#1a1a2e;--g1:#f3f4f6;--g2:#e5e7eb}
*{box-sizing:border-box}
body { font-family: Inter, system-ui, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%); min-height: 100vh }
.navbar{background:#fff;padding:14px 0;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.navbar .container{max-width:1280px}
.logo{width:38px;height:38px;background:linear-gradient(135deg,var(--a),#e6b800);border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-weight:800}
.bouncing-logo{animation:bounce 1s ease-in-out infinite;display:inline-flex;align-items:center;justify-content:center}
.bouncing-logo:hover{animation-play-state:paused}
@keyframes bounce{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-8px) rotate(-5deg)}50%{transform:translateY(0) rotate(0deg)}75%{transform:translateY(-4px) rotate(5deg)}}
.card{background:#fff;border-radius:16px;box-shadow:0 4px 15px rgba(0,0,0,0.06);border:none;transition:all 0.3s ease}
.btn-p{background:linear-gradient(135deg,var(--p),var(--pd));border:none;border-radius:12px;font-weight:600;padding:12px 24px;transition:all 0.3s ease;color:#fff}
.btn-p:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(34,139,34,0.4);color:#fff}
.fc{border:2px solid var(--g2);border-radius:12px;padding:12px 16px;transition:all 0.3s ease}
.fc:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(34,139,34,0.1)}
footer{background:var(--d);color:#fff;padding:40px 0 20px}
.quick-btn{display:block;padding:16px 12px;border-radius:16px;background:#fff;box-shadow:0 4px 15px rgba(0,0,0,0.08);text-decoration:none;color:var(--p);transition:all 0.3s ease}
.quick-btn:hover{transform:translateY(-6px) scale(1.05);box-shadow:0 15px 35px rgba(34,139,34,0.25);color:var(--p)}
.hover-shadow{transition:all 0.3s ease}
.hover-shadow:hover{transform:translateY(-4px);box-shadow:0 8px 25px rgba(0,0,0,0.12)}
.profile-pic{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--a)}
.profile-pic-placeholder{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--a),#e6b800);display:inline-flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:0.8rem;border:2px solid var(--a)}
.profile-pic-lg{width:45px;height:45px;border-radius:50%;object-fit:cover;border:2px solid var(--a)}
.profile-pic-placeholder-lg{width:45px;height:45px;border-radius:50%;background:linear-gradient(135deg,var(--a),#e6b800);display:inline-flex;align-items:center;justify-content:center;font-weight:800;color:#fff;border:2px solid var(--a)}
.nav-icon{position:relative}
.nav-icon .badge-count{position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;border-radius:50%;min-width:18px;height:18px;font-size:10px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.nav-link{font-weight:500;padding:8px 14px!important;border-radius:8px;transition:background 0.2s}
.nav-link:hover{background:var(--g1)}
.nav-link.active-link{background:rgba(34,139,34,0.08);color:var(--p)}
.nav-divider{width:1px;height:24px;background:var(--g2);margin:0 8px}
.form-error{color:var(--danger);font-size:0.8rem;margin-top:4px;display:none}
.form-control.is-invalid,.form-select.is-invalid{border-color:var(--danger)}
.spinner-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.8);display:none;align-items:center;justify-content:center;z-index:9999}
.spinner-overlay.active{display:flex}
.notif-item{padding:10px 14px;border-bottom:1px solid var(--g1);transition:background 0.2s;cursor:pointer}
.notif-item:hover{background:var(--g1)}
.notif-item.unread{background:rgba(34,139,34,0.04);border-left:3px solid var(--p)}
.notif-item .notif-title{font-weight:600;font-size:0.85rem;margin-bottom:2px}
.notif-item .notif-msg{font-size:0.8rem;color:#666;margin:0}
.notif-item .notif-time{font-size:0.7rem;color:#999;margin-top:4px}
@media(max-width:991px){.nav-divider{display:none}.navbar-nav{padding-top:12px}}
@media(max-width:768px){.navbar-brand{font-size:1.2rem}.card{border-radius:12px}.quick-btn{padding:12px 8px}}
</style>
</head>
<body>
<div class='spinner-overlay' id='loadingSpinner'>
<div class='spinner-border text-success' style='width:3rem;height:3rem' role='status'></div>
</div>
<nav class='navbar navbar-expand-lg sticky-top'>
<div class='container'>
<a class='navbar-brand d-flex align-items-center' href="/"><span class='logo bouncing-logo me-2'>YC</span><span class='fw-bold'>YoCoin</span></a>
<button class='navbar-toggler border-0' type='button' data-bs-toggle='collapse' data-bs-target='#navbarNav'>
<span class='navbar-toggler-icon'></span>
</button>
<div class='collapse navbar-collapse' id='navbarNav'>

<ul class='navbar-nav ms-auto align-items-center'>
<li class='nav-item'><a class='nav-link' href="/login"><i class='bi bi-box-arrow-in-right me-1'></i>Login</a></li>
<li class='nav-item ms-2'><a class='btn btn-p' href="/register">Get Started</a></li>
</ul>

</div>
</div>
</nav>
<main class='py-4 container'>




<style>
body{background:#0d0d1a!important}
footer{display:none!important}
.login-bg{position:fixed;inset:0;z-index:0;background:url('https://images.unsplash.com/photo-1566577739112-5180d4bf9391?w=1600&q=80') center/cover no-repeat;filter:brightness(0.35) saturate(1.2);transform:scale(1.1);animation:slowZoom 20s ease-in-out infinite alternate}
@keyframes slowZoom{0%{transform:scale(1.1)}100%{transform:scale(1.25)}}
.login-overlay{position:fixed;inset:0;z-index:1;background:linear-gradient(135deg,rgba(0,0,0,0.7) 0%,rgba(34,139,34,0.25) 50%,rgba(0,0,0,0.6) 100%)}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;z-index:2;margin:calc(-1.5rem - 76px) calc(-50vw + 50%) 0;padding-top:76px;width:100vw}

.floating-coin{position:fixed;width:40px;height:40px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ffd700,#b8860b);box-shadow:0 0 20px rgba(255,215,0,0.3),inset 0 -3px 8px rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#8B6914;opacity:0;animation:floatCoin var(--d,12s) ease-in-out var(--dd,0s) infinite;pointer-events:none;z-index:3}
.floating-coin::after{content:'YC';font-size:10px;font-weight:900;color:rgba(139,105,20,0.6);letter-spacing:0}
@keyframes floatCoin{0%{opacity:0;transform:translateY(100vh) rotate(0deg) scale(0.5)}10%{opacity:0.6}90%{opacity:0.6}100%{opacity:0;transform:translateY(-10vh) rotate(720deg) scale(1.2)}}

.login-card{position:relative;z-index:4;width:100%;max-width:420px;margin:0 auto}
.login-card .card{background:rgba(255,255,255,0.06);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.1);border-radius:24px;box-shadow:0 25px 60px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.1);padding:2.5rem}
.login-card .logo{width:56px;height:56px;font-size:1.4rem;margin:0 auto 1rem}
.login-card h2{color:#fff;font-weight:700}
.login-card .text-muted{color:rgba(255,255,255,0.5)!important}
.login-card .fc{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:#fff;border-radius:14px;padding:14px 18px}
.login-card .fc:focus{background:rgba(255,255,255,0.1);border-color:var(--a);box-shadow:0 0 0 3px rgba(212,168,0,0.15)}
.login-card .fc::placeholder{color:rgba(255,255,255,0.3)}
.login-card .form-label{color:rgba(255,255,255,0.7);font-weight:500;font-size:0.85rem;margin-bottom:6px}
.login-card .form-check-label{color:rgba(255,255,255,0.6)}
.login-card .input-group .btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.5)}
.login-card .input-group .btn:hover{background:rgba(255,255,255,0.12)}
.login-card a{color:var(--a)!important}
.login-card a:hover{color:#e6b800!important}
.login-card .btn-p{background:linear-gradient(135deg,#D4A800,#b8860b);border-radius:14px;padding:14px;font-weight:700;font-size:1rem;letter-spacing:0.3px}
.login-card .btn-p:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(212,168,0,0.35)}
.login-card hr{opacity:0.1}
</style>

<div class='login-page'>
<div class='login-bg'></div>
<div class='login-overlay'></div>

<div class='floating-coin' style='left:8%;--d:14s;--dd:0s'></div>
<div class='floating-coin' style='left:22%;--d:18s;--dd:3s;width:30px;height:30px;font-size:10px'></div>
<div class='floating-coin' style='left:40%;--d:16s;--dd:6s'></div>
<div class='floating-coin' style='left:55%;--d:20s;--dd:2s;width:35px;height:35px;font-size:12px'></div>
<div class='floating-coin' style='left:70%;--d:15s;--dd:8s'></div>
<div class='floating-coin' style='left:85%;--d:17s;--dd:4s;width:28px;height:28px;font-size:9px'></div>
<div class='floating-coin' style='left:15%;--d:22s;--dd:10s;width:45px;height:45px;font-size:15px'></div>
<div class='floating-coin' style='left:92%;--d:19s;--dd:7s'></div>
<div class='floating-coin' style='left:48%;--d:13s;--dd:5s;width:25px;height:25px;font-size:8px'></div>
<div class='floating-coin' style='left:65%;--d:21s;--dd:9s;width:32px;height:32px;font-size:11px'></div>

<div class='login-card'>
<div class='card'>
<div class='text-center mb-4'>
<div class='logo bouncing-logo' style='width:56px;height:56px;font-size:1.4rem;margin:0 auto 1rem'>YC</div>
<h2 class='fw-bold mb-1' style='color:#fff'>Welcome Back</h2>
<p class='text-muted mb-0' style='color:rgba(255,255,255,0.5)!important'>Sign in to your account</p>
</div>
<form method='POST' action="/login">
<input id="csrf_token" name="csrf_token" type="hidden" value="IjQ0NTFlZDQzZGU4YWI5NzU3M2VjMjEzNWE0MGQ4ZmU4OTY5NjgxOWYi.ahBxBQ.KDD7njpgVnEEayWrrFeGjpRjReE">
<div class='mb-3'>
<label class='form-label'>Email Address</label>
<input type='email' class='form-control fc' id='email' name='email' placeholder='you@example.com' required>
</div>
<div class='mb-3'>
<label class='form-label'>Password</label>
<div class='input-group'>
<input type='password' class='form-control fc' id='password' name='password' placeholder='Your password' required>
<button class='btn btn-outline-secondary' type='button' onclick='togglePassword(event)'><i class='bi bi-eye'></i></button>
</div>
</div>
<div class='mb-4 form-check'><input type='checkbox' class='form-check-input' id='remember' name='remember'><label class='form-check-label' for='remember'>Remember me</label></div>
<div class='d-grid'><button type='submit' class='btn btn-p btn-lg'><i class='bi bi-box-arrow-in-right me-2'></i>Sign In</button></div>
</form>
<div class='text-center mt-4'>
<p class='text-muted mb-0' style='color:rgba(255,255,255,0.5)!important'>New to YoCoin? <a href="/register" style='color:var(--a)!important;font-weight:600;'>Create Account</a></p>
<p class='text-muted mb-0 mt-1'><a href="/password-reset" style='color:rgba(255,255,255,0.4)!important;font-size:0.85rem;'>Forgot Password?</a></p>
</div>
</div>
</div>
</div>

</main>
<footer class='text-center'>
<p class='text-white-50'>&copy; <span id='footerYear'></span> YoCoin - Microloan Platform for Uganda</p>
<p class='text-white-50 small'>Powered by Blockchain Technology | <a href='/terms' class='text-white-50'>Terms</a> | <a href='/privacy' class='text-white-50'>Privacy</a></p>
</footer>
<script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js'></script>
<script>
document.getElementById('footerYear').textContent = new Date().getFullYear();
document.addEventListener('submit', function(e) {
    var btn = e.target.querySelector('button[type="submit"]');
    if (btn) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>' + btn.textContent;
    }
});
function showLoading() { document.getElementById('loadingSpinner').classList.add('active'); }
function hideLoading() { document.getElementById('loadingSpinner').classList.remove('active'); }

</script>

<script>
function togglePassword(e){var p=document.getElementById('password');var i=e.currentTarget.querySelector('i');p.type=p.type==='password'?'text':'password';i.classList.toggle('bi-eye');i.classList.toggle('bi-eye-slash')}
</script>
